<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式接口测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        #output { border: 1px solid #ffffff; padding: 20px; min-height: 200px; background: #f9f9f9; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .token { color: #333; }
    </style>
</head>
<body>
    <h1>流式响应测试</h1>
    <div>
        <label>Session ID:</label>
        <input type="text" id="session_id" value="1" style="width: 200px;">
    </div>
    <div style="margin-top: 10px;">
        <label>Message:</label>
        <input type="text" id="message" value="你好" style="width: 400px;">
    </div>
    <button onclick="startStream()">发送请求</button>
    <button onclick="clearOutput()">清空</button>

    <h3>响应内容：</h3>
    <div id="output"></div>

    <script>
        async function startStream() {
            const sessionId = document.getElementById('session_id').value;
            const message = document.getElementById('message').value;
            const output = document.getElementById('output');

            output.innerHTML = '<span style="color:#fdce49;">等待响应...</span>';

            try {
                const response = await fetch('http://localhost:8000/ai/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message,
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                output.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            try {
                                const event = JSON.parse(data);
                                if (event.event === 'token') {
                                    output.innerHTML += '<span class="token">' + event.data.content + '</span>';
                                } else if (event.event === 'done') {
                                    output.innerHTML += '<br><br><span style="color:green;">[完成]</span>';
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                output.innerHTML = '<span style="color:red;">错误: ' + err.message + '</span>';
            }
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
        }
    </script>
</body>
</html>
